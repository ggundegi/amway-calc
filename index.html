<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 암웨이 보상 시뮬레이터</title>
    <style>
        :root { --amway-red: #a53046; --amway-gold: #b3995d; --bg-gray: #f2f2f7; --blue-post-tax: #007aff; --travel-blue: #008080; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: var(--bg-gray); margin: 0; padding: 15px; color: #1c1c1e; }
        .card { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { color: var(--amway-red); margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid var(--amway-red); padding-bottom: 8px; margin-bottom: 15px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: bold; color: #8e8e93; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #d1d1d6; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; text-align: right; background: #fff; -webkit-appearance: none; }
        input:focus { border-color: var(--amway-red); outline: none; background-color: #fff9fa; }
        .ratio-input { text-align: left !important; background: #f2f2f7 !important; font-weight: bold; }
        .btn-calc { width: 100%; background: var(--amway-red); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .result-card { border-top: 8px solid var(--amway-gold); }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f2f2f7; font-size: 0.95rem; }
        .result-item.plus { color: #34c759; font-weight: bold; }
        .result-item.minus { color: #ff3b30; }
        .result-item.total-post { color: var(--blue-post-tax); font-weight: bold; font-size: 1.4rem; border-top: 2px solid #333; margin-top: 10px; padding-top: 15px; }
        .val { font-weight: 700; color: #000; }
        
        .check-group { display: flex; align-items: center; background: #fff9fa; padding: 10px; border-radius: 10px; border: 1px dashed var(--amway-red); margin-top: 10px; }
        .check-group input { width: 22px; height: 22px; margin-right: 10px; cursor: pointer; accent-color: var(--amway-red); }
        .check-group label { margin-bottom: 0; color: var(--amway-red); font-size: 0.9rem; cursor: pointer; }

        .annual-card { background: #fffdf0; border: 1px solid #f0d58e; border-left: 6px solid var(--amway-gold); }
        .annual-title { color: #856404; font-weight: bold; margin-bottom: 12px; font-size: 1rem; border-bottom: 1px inset #f0d58e; padding-bottom: 5px; }
        .annual-item { font-size: 0.85rem; margin-bottom: 15px; color: #533f03; }
        .ttca-box { background: rgba(255,255,255,0.7); padding: 12px; border-radius: 8px; margin-top: 8px; border: 1px solid #eec; }
        .ttca-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 2px; }
        .badge { background: var(--amway-gold); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.72rem; margin-right: 5px; font-weight: bold; }
        .badge-fq { background: #6c5ce7; }
        .badge-travel { background: var(--travel-blue); }
        .price-text { color: #a53046; font-weight: bold; }
        .growth-rate { color: #007aff; font-weight: bold; font-size: 0.75rem; }
        .method-box { font-size: 0.75rem; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 8px; line-height: 1.5; border: 1px solid #eee; }
        /* 버전 표시 스타일 */
        .version-tag { font-size: 0.7rem; font-weight: normal; color: #aaa; float: right; }
    </style>
</head>
<body>

<div class="card">
    <!-- 제목 옆에 버전 정보 추가 -->
    <h2>환경 설정 및 본인 실적 <span style="color: #a53046; margin-left: 10px; font-size: 0.8rem;">[ Version 1.0 ]</span></h2>
    <div class="input-group">
        <label>BV/PV 비율 (환율)</label>
        <input type="text" id="ratio" class="ratio-input" value="1.78" inputmode="decimal">
    </div>
    <div class="input-group">
        <label>본인 개인 PV</label>
        <input type="text" id="personalPV" oninput="handleInput(this)" value="0" inputmode="numeric">
    </div>
    <div class="check-group">
        <input type="checkbox" id="bronzeEligible" checked>
        <label for="bronzeEligible">브론즈 빌더 인센티브 대상자 (30%)</label>
    </div>
</div>

<div class="card">
    <h2>하부 레그별 실적 (PV)</h2>
    <div class="input-group"><label>레그 1 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
    <div class="input-group"><label>레그 2 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
    <div class="input-group"><label>레그 3 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
    <div class="input-group"><label>레그 4 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
    <div class="input-group"><label>레그 5 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
    <div class="input-group"><label>레그 6 PV</label><input type="text" class="legPV" oninput="handleInput(this)" value="0" inputmode="numeric"></div>
</div>

<div class="card">
    <h2>3차 MD 보너스 정보</h2>
    <div class="input-group">
        <label>하위 독립 레그 매출 합계 (Depth PV)</label>
        <input type="text" id="depthPV" oninput="handleInput(this)" value="0" inputmode="numeric">
    </div>
</div>

<button class="btn-calc" onclick="calculate()">전체 수익 통합 시뮬레이션</button>

<div class="card result-card" id="resultArea">
    <h2>월간 예상 수익 리포트</h2>
    <div class="result-item"><span>전체 그룹 PV</span><span class="val" id="totalPVDisplay">0</span></div>
    <div class="result-item"><span>독립 레그 수</span><span class="val" id="legCount">0 개</span></div>
    <div class="result-item"><span>나의 보너스 요율</span><span class="val" id="appliedRate">0%</span></div>
    <div class="result-item plus"><span>1차 후원수당 (차액)</span><span class="val" id="firstBonus">0 원</span></div>
    <div class="result-item plus"><span>2차 리더십 보너스 (6%)</span><span class="val" id="leadBonus">0 원</span></div>
    <div class="result-item minus"><span>최소보장 차감 (Pass-up)</span><span class="val" id="passUp">0 원</span></div>
    <div class="result-item plus"><span>기타 보너스 (루비/MD/브론즈)</span><span class="val" id="etcBonus">0 원</span></div>
    <div class="result-item total-post"><span>실제 수령액 (세후 3.3%)</span><span class="val" id="postTaxIncome">0 원</span></div>
</div>

<div class="card annual-card" id="annualArea" style="display:none;">
    <div class="annual-title">🏆 핀 달성 시 연간/일시 보상 상세</div>
    <div id="annualContent"></div>
</div>

<!-- 페이지 하단 버전 표시 -->
<div style="text-align: center; font-size: 0.7rem; color: #bbb; margin-bottom: 20px;">암웨이 수익 계산기 v 1.0</div>

<script>
    function formatNumber(n) { return Math.floor(n).toLocaleString(); }
    
    function handleInput(obj) {
        let value = obj.value.replace(/[^0-9]/g, ""); 
        obj.value = (value === "" || value === "0") ? "0" : Number(value).toLocaleString();
    }

    function parseVal(idOrElem) {
        let val = typeof idOrElem === 'string' ? document.getElementById(idOrElem).value : idOrElem.value;
        return parseFloat(val.replace(/,/g, "")) || 0;
    }

    function getRate(pv) {
        if (pv >= 10000000) return 0.21;
        if (pv >= 6800000) return 0.18;
        if (pv >= 4000000) return 0.15;
        if (pv >= 2400000) return 0.12;
        if (pv >= 1200000) return 0.09;
        if (pv >= 600000) return 0.06;
        if (pv >= 200000) return 0.03;
        return 0;
    }

    function saveData() {
        const ratio = document.getElementById('ratio').value;
        const personalPV = document.getElementById('personalPV').value;
        const depthPV = document.getElementById('depthPV').value;
        const legs = Array.from(document.getElementsByClassName('legPV')).map(input => input.value);
        const bronzeEligible = document.getElementById('bronzeEligible').checked;
        
        const amwayData = { ratio, personalPV, depthPV, legs, bronzeEligible };
        localStorage.setItem('amway_v2026_data', JSON.stringify(amwayData));
    }

    function loadData() {
        const savedData = localStorage.getItem('amway_v2026_data');
        if (savedData) {
            const data = JSON.parse(savedData);
            document.getElementById('ratio').value = data.ratio;
            document.getElementById('personalPV').value = data.personalPV;
            document.getElementById('depthPV').value = data.depthPV;
            if (data.bronzeEligible !== undefined) {
                document.getElementById('bronzeEligible').checked = data.bronzeEligible;
            }
            const legInputs = document.getElementsByClassName('legPV');
            data.legs.forEach((val, i) => {
                if(legInputs[i]) legInputs[i].value = val;
            });
        }
    }

    function calculate() {
        saveData();

        const ratio = parseFloat(document.getElementById('ratio').value) || 0;
        const personalPV = parseVal('personalPV');
        const depthPV = parseVal('depthPV');
        const bronzeEligible = document.getElementById('bronzeEligible').checked;
        const legs = document.getElementsByClassName('legPV');
        
        let leadershipBonusGrossBV = 0; 
        let qualifiedLegsCount = 0;
        let groupPV = personalPV;
        let groupBonusSubSumBV = 0;
        let bronzeCount = 0;
        let totalPV = personalPV;

        for (let i = 0; i < legs.length; i++) {
            let lpv = parseVal(legs[i]);
            totalPV += lpv;
            if (lpv >= 10000000) {
                qualifiedLegsCount++;
                leadershipBonusGrossBV += (lpv * ratio * 0.06);
            } else {
                groupPV += lpv;
                groupBonusSubSumBV += (lpv * ratio * getRate(lpv));
                if (lpv >= 600000) bronzeCount++;
            }
        }

        let isQualifiedSP = (groupPV >= 10000000 || qualifiedLegsCount >= 2 || (qualifiedLegsCount === 1 && groupPV >= 4000000));
        let appliedRate = isQualifiedSP ? 0.21 : getRate(groupPV);

        const firstBonus = Math.max(0, (groupPV * ratio * appliedRate) - groupBonusSubSumBV);
        let rubyBonus = groupPV >= 20000000 ? groupPV * ratio * 0.02 : 0;
        let mdBonus = qualifiedLegsCount >= 3 ? depthPV * ratio * 0.01 : 0;
        
        let bronzeBonusAmt = 0;
        if (bronzeEligible && appliedRate >= 0.15 && (bronzeCount + qualifiedLegsCount) >= 3) {
            bronzeBonusAmt = firstBonus * 0.3;
        }

        let passUpBV = (qualifiedLegsCount > 0 && groupPV < 10000000) ? (10000000 - groupPV) * ratio * 0.06 : 0;
        const netLeadershipBonus = Math.max(0, leadershipBonusGrossBV - passUpBV);

        const totalPreTax = firstBonus + netLeadershipBonus + rubyBonus + mdBonus + bronzeBonusAmt;
        const totalPostTax = totalPreTax * (1 - 0.033);

        document.getElementById('totalPVDisplay').innerText = formatNumber(totalPV);
        document.getElementById('legCount').innerText = qualifiedLegsCount + " 개";
        document.getElementById('appliedRate').innerText = (appliedRate * 100).toFixed(0) + "%";
        document.getElementById('firstBonus').innerText = formatNumber(firstBonus) + " 원";
        document.getElementById('leadBonus').innerText = formatNumber(leadershipBonusGrossBV) + " 원";
        document.getElementById('passUp').innerText = "-" + formatNumber(passUpBV) + " 원";
        document.getElementById('etcBonus').innerText = formatNumber(rubyBonus + mdBonus + bronzeBonusAmt) + " 원";
        document.getElementById('postTaxIncome').innerText = formatNumber(totalPostTax) + " 원";

        const annualArea = document.getElementById('annualArea');
        const annualContent = document.getElementById('annualContent');
        let annualHTML = "";

        if (isQualifiedSP) {
            let annualPQBase = (firstBonus + rubyBonus) * 12;
            let annualFQBase = (netLeadershipBonus + mdBonus) * 12;

            annualHTML += `
                <div class="annual-item"><span class="badge">TTCA</span> <b>핀 달성 일시불 축하금</b>
                    <div class="ttca-box">
                        <div class="ttca-row"><span>PT / F.PT 신규·재:</span><span class="price-text">180 / 360만원</span></div>
                        ${qualifiedLegsCount >= 2 ? `<div class="ttca-row"><span>사파이어 신규/재:</span><span class="price-text">각 470만원</span></div>` : ''}
                        ${qualifiedLegsCount >= 3 ? `<div class="ttca-row" style="border-top:1px dashed #ddd; padding-top:5px; margin-top:5px;"><span>에메랄드 신규/재:</span><span class="price-text">각 1,190만원</span></div>` : ''}
                        ${qualifiedLegsCount >= 6 ? `<div class="ttca-row"><span>다이아몬드 신규/재:</span><span class="price-text">각 1,780만원</span></div>` : ''}
                    </div>
                </div>
                <div class="annual-item"><span class="badge">PQ보너스</span> <b>사이드 그룹 성장 인센티브 (PQ)</b>
                    <div class="ttca-box">
                        <div class="ttca-row"><span>유지(전년동일) <span class="growth-rate">10%</span>:</span><span class="price-text">${formatNumber(annualPQBase * 0.1)}원</span></div>
                        <div class="ttca-row"><span>+1 ~ 2개 성장 <span class="growth-rate">20%</span>:</span><span class="price-text">${formatNumber(annualPQBase * 0.2)}원</span></div>
                        <div class="ttca-row"><span>+3 ~ 5개 성장 <span class="growth-rate">30%</span>:</span><span class="price-text">${formatNumber(annualPQBase * 0.3)}원</span></div>
                        <div class="ttca-row"><span>+6개 이상 성장 <span class="growth-rate">40%</span>:</span><span class="price-text">${formatNumber(annualPQBase * 0.4)}원</span></div>
                    </div>
                </div>
            `;
            if (qualifiedLegsCount >= 1) {
                annualHTML += `
                    <div class="annual-item">
                        <span class="badge badge-fq">FQ보너스</span> <b>독립 레그 성장 인센티브 (FQ)</b>
                        <div class="ttca-box">
                            <div class="ttca-row"><span>유지(전년동일) <span class="growth-rate">10%</span>:</span><span class="price-text">${formatNumber(annualFQBase * 0.1)}원</span></div>
                            <div class="ttca-row"><span>+1 ~ 2개 성장 <span class="growth-rate">20%</span>:</span><span class="price-text">${formatNumber(annualFQBase * 0.2)}원</span></div>
                            <div class="ttca-row"><span>+3 ~ 5개 성장 <span class="growth-rate">30%</span>:</span><span class="price-text">${formatNumber(annualFQBase * 0.3)}원</span></div>
                            <div class="ttca-row"><span>+6개 이상 성장 <span class="growth-rate">40%</span>:</span><span class="price-text">${formatNumber(annualFQBase * 0.4)}원</span></div>
                        </div>
                    </div>
                `;
            }
            if (qualifiedLegsCount >= 3) {
                let bonusType = qualifiedLegsCount >= 6 ? "에메랄드 & 다이아몬드" : "에메랄드";
                annualHTML += `
                    <div class="annual-item"><span class="badge">보너스</span> <b>${bonusType} 연말 지분 배당</b>
                        <div class="ttca-box">
                            <div class="ttca-row"><span>에메랄드 배당(예상):</span><span class="price-text">약 1,500~2,500만원</span></div>
                            ${qualifiedLegsCount >= 6 ? `<div class="ttca-row"><span>다이아몬드 배당(예상):</span><span class="price-text">약 5,000~1억원 이상</span></div>` : ''}
                            <div class="method-box">
                                <b>[배당 계산 방식 - 매뉴얼 48p]</b><br>
                                1. 한국암웨이 전체 연간 BV의 0.25% 기금 조성<br>
                                2. 본인의 유자격 BV에 에메랄드/다이아몬드 점수를 곱함<br>
                                3. 전체 기금을 유자격자 비중대로 나누어 배분
                            </div>
                        </div>
                    </div>
                `;
            }
            if (qualifiedLegsCount >= 6) {
                annualHTML += `<div class="annual-item"><span class="badge badge-travel">NCA</span> 다이아몬드 인비테이셔널 여행 자격</div>`;
            } else {
                annualHTML += `<div class="annual-item"><span class="badge badge-travel">NCA</span> 리더십 세미나(가족 여행) 초청 대상</div>`;
            }
        }

        if (annualHTML !== "") { annualArea.style.display = "block"; annualContent.innerHTML = annualHTML; }
        else { annualArea.style.display = "none"; }
        document.getElementById('resultArea').scrollIntoView({behavior: "smooth"});
    }
    
    window.onload = function() {
        loadData();
        calculate();
    };
</script>
</body>
</html>
